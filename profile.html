<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmplifyHub — Profile</title>
<meta name="description" content="Your AmplifyHub profile.">
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth-config.js"></script>
<script src="auth.js"></script>
<script src="assets/journey-progress.js"></script>
<script src="assets/user-stats.js"></script>
<script>requireAuth();</script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070e;--bg2:#0b0b16;--card:#13132a;--card2:#181838;--glass:rgba(19,19,42,.55);
  --accent:#FFD54A;--accent-dim:rgba(255,213,74,.1);--accent-glow:rgba(255,213,74,.3);
  --warm:#FFA726;--green:#00e696;--blue:#64B5F6;--purple:#BA68C8;--red:#ff5f57;--pink:#f06292;
  --white:#fff;--text:#b0b0c8;--muted:#8a8aa4;
  --border:rgba(255,213,74,.07);--border-h:rgba(255,213,74,.22);
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;--sb:240px;
}
html{scroll-behavior:smooth}body{font-family:var(--font);background:var(--bg);color:var(--white);display:flex;min-height:100vh;overflow-x:hidden}

.sb{width:var(--sb);position:fixed;top:0;left:0;bottom:0;background:var(--bg2);border-right:1px solid var(--border);padding:24px 16px;display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sb-logo{font-size:20px;font-weight:800;padding:0 8px 24px}.sb-logo span{color:var(--accent)}
.sb-nav{display:flex;flex-direction:column;gap:4px;flex:1}
.si{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;text-decoration:none;border:1px solid transparent}
.si:hover{color:var(--text);background:rgba(255,255,255,.03)}.si.act{color:var(--accent);background:var(--accent-dim);border-color:var(--border)}
.si-ic{width:20px;text-align:center;font-size:15px}
.sb-d{height:1px;background:var(--border);margin:10px 8px}
.sb-u{display:flex;align-items:center;gap:10px;padding:12px 8px;border-top:1px solid var(--border);margin-top:auto;cursor:pointer}
.sb-av{width:32px;height:32px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--bg)}
.sb-un{font-size:13px;font-weight:600}.sb-ur{font-size:11px;color:var(--muted)}
.sb-x{display:none;position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
.mh{display:none;position:fixed;top:0;left:0;right:0;z-index:200;padding:14px 20px;background:rgba(7,7,14,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);align-items:center;justify-content:space-between}
.mh .logo{font-size:18px;font-weight:800}.mh .logo span{color:var(--accent)}
.mb{background:none;border:none;cursor:pointer}.mb span{display:block;width:20px;height:2px;background:#fff;margin:4px 0}

.main{margin-left:var(--sb);flex:1;padding:32px 40px 80px;max-width:1100px;min-width:0}
.fu{opacity:0;transform:translateY(18px);transition:all .6s cubic-bezier(.16,1,.3,1)}.fu.v{opacity:1;transform:translateY(0)}
.sec{margin-bottom:32px}
.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-h h2{font-size:18px;font-weight:800;letter-spacing:-.3px}
.sec-link{font-size:12px;color:var(--accent);font-weight:600;cursor:pointer;text-decoration:none}

/* PROFILE HEADER */
.phead{background:linear-gradient(135deg,rgba(255,213,74,.06),rgba(255,167,38,.03),var(--card));border:1px solid var(--border-h);border-radius:24px;padding:32px;position:relative;overflow:hidden;margin-bottom:28px}
.phead::before{content:'';position:absolute;top:-40%;right:-10%;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(255,213,74,.06),transparent 70%);pointer-events:none}
.phead-top{display:flex;align-items:flex-start;gap:20px;position:relative;z-index:2;flex-wrap:wrap}
.p-av{width:88px;height:88px;min-width:88px;border-radius:22px;background:linear-gradient(135deg,var(--accent),var(--warm));display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:var(--bg);box-shadow:0 8px 32px var(--accent-glow)}
.p-info{flex:1;min-width:200px}
.p-name{font-size:24px;font-weight:900;letter-spacing:-.5px}
.p-user{font-size:13px;color:var(--muted);margin-top:2px}
.p-bio{font-size:14px;color:var(--text);margin-top:8px;line-height:1.5;max-width:440px}
.p-meta{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap}
.p-meta-item{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.p-edit{background:var(--accent);color:var(--bg);border:none;padding:11px 24px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .3s;white-space:nowrap}
.p-edit:hover{box-shadow:0 6px 20px var(--accent-glow);transform:translateY(-2px)}
.phead-stats{display:flex;gap:12px;margin-top:24px;position:relative;z-index:2;flex-wrap:wrap}
.ph-stat{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:14px;padding:12px 18px;text-align:center;min-width:90px}
.ph-v{font-size:20px;font-weight:900}.ph-l{font-size:10px;color:var(--muted);margin-top:2px}
.ph-v.g{color:var(--accent)}.ph-v.gr{color:var(--green)}.ph-v.w{color:var(--warm)}

/* QUICK STATS GRID */
.qs-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.qs{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;text-align:center;transition:all .3s}
.qs:hover{border-color:var(--border-h);transform:translateY(-2px)}
.qs-ic{font-size:20px;margin-bottom:8px}
.qs-v{font-size:22px;font-weight:900;letter-spacing:-.5px}
.qs-l{font-size:10px;color:var(--muted);margin-top:2px}

/* PROGRESS CARDS */
.pr-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pr{background:var(--glass);backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:16px;padding:20px;transition:all .3s}
.pr:hover{border-color:var(--border-h)}
.pr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pr-name{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.pr-pct{font-size:13px;font-weight:800;color:var(--accent)}
.pr-bar{height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.pr-fill{height:100%;border-radius:4px;width:0;transition:width 1.5s cubic-bezier(.16,1,.3,1)}

/* ACHIEVEMENTS */
.ach-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.ach{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 10px;text-align:center;transition:all .3s}
.ach:hover{border-color:var(--border-h);transform:translateY(-3px)}
.ach.earned:hover{box-shadow:0 8px 24px rgba(255,213,74,.08)}
.ach-e{font-size:28px;margin-bottom:8px;display:block;transition:transform .3s}.ach:hover .ach-e{transform:scale(1.15)}
.ach-n{font-size:11px;font-weight:700}
.ach-req{font-size:9px;color:var(--muted);margin-top:4px;line-height:1.3}
.ach.earned{border-color:var(--border-h)}.ach.earned .ach-n{color:var(--accent)}
.ach.locked{opacity:.5;filter:grayscale(.7)}.ach.locked .ach-e{filter:grayscale(1)}
.ach-lock{font-size:9px;color:var(--muted);margin-top:2px}

/* STATE + BANNERS */
.state-banner{border-radius:14px;padding:14px 18px;margin-bottom:20px;font-size:13px;line-height:1.6;border:1px solid var(--border-h)}
.state-banner.empty{background:rgba(255,213,74,.05);color:var(--text)}
.state-banner.offline{background:rgba(255,167,38,.07);border-color:rgba(255,167,38,.25);color:var(--text)}
.state-banner.err{background:rgba(255,95,87,.07);border-color:rgba(255,95,87,.25);color:var(--text)}
.state-banner b{color:var(--white)} .state-banner a{color:var(--accent);font-weight:600;text-decoration:none}
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04),rgba(255,255,255,.07),rgba(255,255,255,.04));background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;color:transparent!important}
@keyframes shimmer{to{background-position:-200% 0}}
.tl-empty,.pr-empty{font-size:13px;color:var(--muted);padding:8px 0}

/* BADGES */
.badge-row{display:flex;gap:10px;flex-wrap:wrap}
.bdg{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:100px;padding:8px 16px;transition:all .25s}
.bdg:hover{border-color:var(--border-h);transform:translateY(-2px)}
.bdg-ic{font-size:16px}.bdg-n{font-size:12px;font-weight:600}

/* TIMELINE */
.tl-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,213,74,.04)}
.tl-item:last-child{border-bottom:none}
.tl-ic{width:32px;height:32px;min-width:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--accent-dim);border:1px solid var(--border)}
.tl-txt{font-size:13px;color:var(--text)}.tl-txt strong{color:var(--white);font-weight:600}
.tl-time{font-size:11px;color:var(--muted);margin-top:2px}

/* GOALS */
.goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.goal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;transition:all .3s}
.goal:hover{border-color:var(--border-h)}
.goal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.goal-name{font-size:13px;font-weight:700}
.goal-val{font-size:12px;color:var(--muted)}
.goal-bar{height:7px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.goal-fill{height:100%;border-radius:4px;width:0;background:var(--accent);transition:width 1.5s cubic-bezier(.16,1,.3,1)}

/* BOOKMARKS */
.bm-bar{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.bm-bar::-webkit-scrollbar{display:none}
.bm{min-width:190px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .25s;flex-shrink:0}
.bm:hover{border-color:var(--border-h);transform:translateY(-2px)}
.bm-ic{width:34px;height:34px;min-width:34px;border-radius:10px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:16px}
.bm-info{overflow:hidden}.bm-t{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bm-m{font-size:10px;color:var(--muted)}

/* SETTINGS SHORTCUTS */
.set-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.set{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 10px;text-align:center;cursor:pointer;transition:all .3s}
.set:hover{border-color:var(--border-h);transform:translateY(-3px)}
.set-ic{font-size:22px;margin-bottom:8px}
.set-n{font-size:12px;font-weight:600;color:var(--text)}

/* RESPONSIVE */
@media(max-width:1000px){.qs-grid{grid-template-columns:repeat(3,1fr)}.ach-grid{grid-template-columns:repeat(4,1fr)}.set-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:860px){
  .sb{transform:translateX(-100%)}.sb.open{transform:translateX(0)}.sb-x{display:block}
  .mh{display:flex}.main{margin-left:0;padding:72px 20px 48px}
  .pr-grid,.goal-grid{grid-template-columns:1fr}
}
@media(max-width:480px){.qs-grid,.ach-grid,.set-grid{grid-template-columns:repeat(2,1fr)}.phead-top{flex-direction:column}.p-edit{width:100%}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
</head>
<body>

<div class="mh"><div class="logo">Amplify<span>Hub</span></div><button class="mb" id="mobBtn" aria-label="Open navigation menu"><span></span><span></span><span></span></button></div>

<aside class="sb" id="sb">
  <button class="sb-x" id="sbX" aria-label="Close navigation menu">✕</button>
  <div class="sb-logo">Amplify<span>Hub</span></div>
  <nav class="sb-nav">
    <a class="si" href="dashboard.html"><span class="si-ic">🏠</span>Dashboard</a>
    <a class="si" href="journey.html"><span class="si-ic">🛤</span>Journey</a>
    <a class="si" href="coach-home.html"><span class="si-ic">🤖</span>AI Coach</a>
    <a class="si" href="dashboard.html#challenge"><span class="si-ic">⚡</span>Challenges</a>
    <a class="si" href="dashboard.html#resources"><span class="si-ic">📚</span>Resources</a>
    <div class="sb-d"></div>
    <a class="si" href="settings.html"><span class="si-ic">⚙️</span>Settings</a>
  </nav>
  <div class="sb-u" onclick="location.href='profile.html'"><div class="sb-av" id="sbAvatar">·</div><div><div class="sb-un" id="sbName">Your profile</div><div class="sb-ur" id="sbRole">Member</div></div></div>
</aside>

<div class="main">

  <div id="stateBanner"></div>

  <!-- PROFILE HEADER -->
  <div class="phead fu">
    <div class="phead-top">
      <div class="p-av" id="pAvatar">·</div>
      <div class="p-info">
        <div class="p-name" id="pName">Loading…</div>
        <div class="p-user" id="pUser"></div>
        <div class="p-bio" id="pBio"></div>

      <a class="p-edit" href="settings.html">✏️ Edit Profile</a>
    </div>
    <div class="phead-stats" id="pHeadStats"></div>
  </div>

  <!-- QUICK STATS -->
  <div class="sec fu">
    <div class="sec-h"><h2>Quick Stats</h2></div>
    <div class="qs-grid" id="qsGrid"></div>
  </div>

  <!-- LEARNING PROGRESS -->
  <div class="sec fu">
    <div class="sec-h"><h2>Learning Progress</h2></div>
    <div class="pr-grid" id="prGrid"></div>
  </div>

  <!-- ACHIEVEMENTS -->
  <div class="sec fu">
    <div class="sec-h"><h2>Achievements</h2><span class="sec-link" id="achCount"></span></div>
    <div class="ach-grid" id="achGrid"></div>
  </div>

  <!-- GOALS -->
  <div class="sec fu">
    <div class="sec-h"><h2>Your Goals</h2></div>
    <div class="goal-grid" id="goalGrid"></div>
  </div>

  <!-- ACTIVITY TIMELINE -->
  <div class="sec fu">
    <div class="sec-h"><h2>Recent Activity</h2></div>
    <div id="timeline"></div>
  </div>

  <!-- SETTINGS SHORTCUTS -->
  <div class="sec fu">
    <div class="sec-h"><h2>Settings</h2></div>
    <div class="set-grid">
      <a class="set" href="settings.html" style="text-decoration:none"><div class="set-ic">👤</div><div class="set-n">Account</div></a>
      <a class="set" href="settings.html" style="text-decoration:none"><div class="set-ic">🔒</div><div class="set-n">Privacy</div></a>
      <a class="set" href="settings.html" style="text-decoration:none"><div class="set-ic">🎨</div><div class="set-n">Appearance</div></a>
      <a class="set" href="settings.html" style="text-decoration:none"><div class="set-ic">⚙️</div><div class="set-n">All Settings</div></a>
    </div>
  </div>

</div>

<script>
(function(){
  'use strict';
  function el(tag, className, text){ var n=document.createElement(tag); if(className)n.className=className; if(text!=null)n.textContent=String(text); return n; }
  function fmtAgo(ts){
    if(!ts) return '';
    var mins=Math.floor((Date.now()-ts)/60000);
    if(mins<2) return 'Just now';
    if(mins<60) return mins+'m ago';
    var hrs=Math.floor(mins/60); if(hrs<24) return hrs+'h ago';
    var days=Math.floor(hrs/24); if(days===1) return 'Yesterday';
    if(days<30) return days+'d ago';
    return new Date(ts).toLocaleDateString();
  }
  function fmtNum(n){ return (n||0).toLocaleString(); }

  function reveal(){
    var obs=new IntersectionObserver(function(es){ es.forEach(function(e,i){ if(e.isIntersecting) setTimeout(function(){ e.target.classList.add('v'); }, i*50); }); },{threshold:.08});
    Array.prototype.forEach.call(document.querySelectorAll('.fu'), function(x){ obs.observe(x); });
  }

  function headStat(value, label, colorVar){
    var s=el('div','ph-stat');
    var v=el('div','ph-v', value); if(colorVar) v.style.color=colorVar;
    s.appendChild(v); s.appendChild(el('div','ph-l', label));
    return s;
  }
  function quickStat(icon, value, label, colorVar){
    var q=el('div','qs');
    q.appendChild(el('div','qs-ic', icon));
    var v=el('div','qs-v', value); if(colorVar) v.style.color=colorVar;
    q.appendChild(v); q.appendChild(el('div','qs-l', label));
    return q;
  }
  function progressRow(name, pct, colorVar, valueText){
    var pr=el('div','pr');
    var top=el('div','pr-top');
    top.appendChild(el('span','pr-name', name));
    top.appendChild(el('span','pr-pct', valueText!=null?valueText:(pct+'%')));
    pr.appendChild(top);
    var bar=el('div','pr-bar'); var fill=el('div','pr-fill'); fill.style.background=colorVar; fill.style.width='0';
    bar.appendChild(fill); pr.appendChild(bar);
    setTimeout(function(){ fill.style.width=Math.max(0,Math.min(100,pct))+'%'; }, 120);
    return pr;
  }

  function render(stats){
    var t=stats.totals, p=stats.profile;

    // Sidebar + header identity (textContent — never HTML — for user-supplied strings).
    var name = p.name || 'Your profile';
    document.getElementById('sbAvatar').textContent = p.initial;
    document.getElementById('sbName').textContent = name;
    document.getElementById('sbRole').textContent = p.email || 'Member';
    document.getElementById('pAvatar').textContent = p.initial;
    document.getElementById('pName').textContent = name;
    document.getElementById('pUser').textContent = p.username ? '@'+p.username : (p.email || '');
    var bio = document.getElementById('pBio');
    if(p.bio){ bio.textContent = p.bio; bio.style.display=''; } else { bio.style.display='none'; }

    var meta=document.getElementById('pMeta'); meta.replaceChildren();
    if(p.joinedAt){
      var joined=new Date(p.joinedAt);
      meta.appendChild(el('span','p-meta-item','📅 Joined '+joined.toLocaleDateString(undefined,{month:'long',year:'numeric'})));
    }
    meta.appendChild(el('span','p-meta-item','📖 '+t.lessonsCompleted+' of '+t.totalLessons+' lessons'));
    if(t.currentModuleName) meta.appendChild(el('span','p-meta-item','🛤 '+t.currentModuleName));

    // Header stats — real, traceable. XP hidden when the user turned XP off.
    var hs=document.getElementById('pHeadStats'); hs.replaceChildren();
    if(stats.prefs.xpVisibility) hs.appendChild(headStat(fmtNum(t.xp), 'Challenge XP', 'var(--accent)'));
    hs.appendChild(headStat(t.streak, t.streak===1?'Day Streak':'Day Streak', 'var(--green)'));
    hs.appendChild(headStat(t.lessonsCompleted, 'Lessons Done', 'var(--warm)'));
    hs.appendChild(headStat(t.journeyPct+'%', 'Journey', 'var(--blue)'));

    // Quick stats — honest metrics only (no calls, no resources-saved).
    var qs=document.getElementById('qsGrid'); qs.replaceChildren();
    if(stats.prefs.xpVisibility) qs.appendChild(quickStat('⚡', fmtNum(t.xp), 'Challenge XP', 'var(--accent)'));
    qs.appendChild(quickStat('📖', t.lessonsCompleted, 'Lessons Done', 'var(--green)'));
    qs.appendChild(quickStat('🤖', t.coachSessions, 'AI Coach Sessions', 'var(--blue)'));
    qs.appendChild(quickStat('⚡', t.challengesCompleted, 'Challenges Done', 'var(--warm)'));
    qs.appendChild(quickStat('🔥', t.streak, 'Day Streak', 'var(--purple)'));
    qs.appendChild(quickStat('🎯', t.avgScore!=null?(t.avgScore+' / 10'):'—', 'Avg Coach Score', 'var(--pink)'));

    // Learning progress — Journey % plus REAL per-skill Coach averages.
    var pr=document.getElementById('prGrid'); pr.replaceChildren();
    pr.appendChild(progressRow('🛤 Journey Progress', t.journeyPct, 'var(--accent)'));
    if(t.avgScore!=null) pr.appendChild(progressRow('🤖 Average Coach Score', Math.round(t.avgScore*10), 'var(--green)', t.avgScore+' / 10'));
    var skillColors=['var(--blue)','var(--purple)','var(--pink)','var(--warm)'];
    stats.skills.slice(0,4).forEach(function(sk,i){
      pr.appendChild(progressRow('📊 '+sk.label, sk.pct, skillColors[i%skillColors.length], sk.avg+' / 10'));
    });
    if(t.avgScore==null && !stats.skills.length){
      pr.appendChild(el('div','pr-empty','Practice with the AI Coach to see your skill scores here.'));
    }

    // Achievements — honest requirements, earned/locked from real data.
    var ach=document.getElementById('achGrid'); ach.replaceChildren();
    var earnedCount=0;
    stats.achievements.forEach(function(a){
      if(a.earned) earnedCount++;
      var tile=el('div','ach '+(a.earned?'earned':'locked'));
      tile.setAttribute('title', a.earned ? ('Earned — '+a.req) : ('Locked — '+a.req));
      tile.appendChild(el('span','ach-e', a.icon));
      tile.appendChild(el('div','ach-n', a.name));
      tile.appendChild(el('div', a.earned?'ach-req':'ach-lock', a.earned?'Earned':('🔒 '+a.req)));
      ach.appendChild(tile);
    });
    document.getElementById('achCount').textContent = earnedCount+' of '+stats.achievements.length+' earned';

    // Goals — backed by real preferences + real progress.
    var gg=document.getElementById('goalGrid'); gg.replaceChildren();
    stats.goals.forEach(function(g){
      var goal=el('div','goal');
      var top=el('div','goal-top');
      top.appendChild(el('span','goal-name', g.name));
      top.appendChild(el('span','goal-val', g.valueText));
      goal.appendChild(top);
      var bar=el('div','goal-bar'); var fill=el('div','goal-fill'); fill.style.width='0';
      bar.appendChild(fill); goal.appendChild(bar); gg.appendChild(goal);
      setTimeout(function(){ fill.style.width=Math.max(0,Math.min(100,g.pct))+'%'; },120);
    });

    // Activity timeline — merged real events, most recent first.
    var tl=document.getElementById('timeline'); tl.replaceChildren();
    if(!stats.timeline.length){
      tl.appendChild(el('div','tl-empty','No activity yet. Complete a lesson, run an AI roleplay, or finish a daily challenge to start your history.'));
    } else {
      stats.timeline.slice(0,8).forEach(function(item){
        var row=el('div','tl-item');
        row.appendChild(el('div','tl-ic', item.icon));
        var body=el('div');
        body.appendChild(el('div','tl-txt', item.text));
        body.appendChild(el('div','tl-time', fmtAgo(item.ts)));
        row.appendChild(body); tl.appendChild(row);
      });
    }
  }

  function banner(kind, node){
    var host=document.getElementById('stateBanner');
    host.replaceChildren();
    var b=el('div','state-banner '+kind);
    b.appendChild(node);
    host.appendChild(b);
  }

  async function init(){
    try{
      var stats = await AmplifyUserStats.load();
      if(!stats.authenticated){ return; } // requireAuth() will have redirected
      render(stats);
      if(stats.offline){
        var f=document.createDocumentFragment();
        f.appendChild(el('b',null,'Showing offline data. '));
        f.appendChild(document.createTextNode('We could not reach the server, so some numbers may be out of date. They will refresh when you are back online.'));
        banner('offline', f);
      } else if(stats.totals.lessonsCompleted===0 && stats.totals.coachSessions===0 && stats.totals.challengesCompleted===0){
        var g=document.createDocumentFragment();
        g.appendChild(el('b',null,'🌱 Welcome! '));
        g.appendChild(document.createTextNode('Your profile fills in as you learn. '));
        var a=el('a',null,'Start your Journey'); a.href='journey.html'; g.appendChild(a);
        g.appendChild(document.createTextNode(' to see your first numbers move.'));
        banner('empty', g);
      }
      reveal();
    }catch(e){
      var f=document.createDocumentFragment();
      f.appendChild(el('b',null,'We could not load your profile. '));
      f.appendChild(document.createTextNode('Please refresh the page. If this keeps happening, check your connection.'));
      banner('err', f);
      reveal();
    }
  }

  document.getElementById('mobBtn').addEventListener('click',function(){ document.getElementById('sb').classList.add('open'); });
  document.getElementById('sbX').addEventListener('click',function(){ document.getElementById('sb').classList.remove('open'); });
  init();
})();
</script>
<script src="assets/sidebar-user.js"></script>
</body>
</html>
