<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmplifyHub — Create Account</title>
<meta name="description" content="Create your free AmplifyHub account and start your cold calling journey today.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="AmplifyHub">
<meta property="og:title" content="AmplifyHub — Create Account">
<meta property="og:description" content="Create your free AmplifyHub account and start your cold calling journey today.">
<meta property="og:image" content="https://amplify-hub-six.vercel.app/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070e;--glass:rgba(19,19,42,.55);
  --accent:#FFD54A;--accent-dim:rgba(255,213,74,.1);--accent-glow:rgba(255,213,74,.3);
  --white:#fff;--text:#b0b0c8;--muted:#8a8aa4;
  --border:rgba(255,213,74,.07);--border-h:rgba(255,213,74,.22);
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow-x:hidden}

.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none}
.orb-1{width:600px;height:600px;background:rgba(255,213,74,.05);top:-20%;right:-5%;animation:o1 16s ease-in-out infinite}
.orb-2{width:400px;height:400px;background:rgba(255,167,38,.04);bottom:-10%;left:-5%;animation:o1 20s ease-in-out infinite reverse}
@keyframes o1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-20px)}}

.card{position:relative;width:100%;max-width:420px;background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:28px;padding:44px 36px;box-shadow:0 32px 80px rgba(0,0,0,.4);opacity:0;transform:translateY(16px) scale(.98);animation:cardIn .7s .2s cubic-bezier(.16,1,.3,1) forwards}
@keyframes cardIn{to{opacity:1;transform:translateY(0) scale(1)}}

.logo{font-size:22px;font-weight:800;letter-spacing:-.5px;text-align:center;margin-bottom:32px}
.logo span{color:var(--accent)}
h1{font-size:24px;font-weight:800;letter-spacing:-.5px;text-align:center;margin-bottom:6px}
.sub{font-size:14px;color:var(--text);text-align:center;margin-bottom:32px}

.field{margin-bottom:18px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.field input{width:100%;padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;color:var(--white);font-size:15px;font-family:var(--font);transition:all .25s;outline:none}
.field input::placeholder{color:var(--muted)}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);background:rgba(255,255,255,.06)}

.submit{width:100%;padding:16px;background:var(--accent);color:#07070e;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .3s;margin-top:8px;position:relative}
.submit:hover{box-shadow:0 8px 32px var(--accent-glow);transform:translateY(-2px)}
.submit::after{content:'';position:absolute;inset:-3px;border-radius:17px;background:var(--accent);filter:blur(18px);opacity:.15;z-index:-1}
.submit:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

.footer-text{text-align:center;margin-top:24px;font-size:13px;color:var(--muted)}
.footer-text a{color:var(--accent);text-decoration:none;font-weight:600;transition:opacity .2s}
.footer-text a:hover{opacity:.7}


@media(max-width:480px){.card{padding:32px 24px;border-radius:20px}}
@media(max-height:800px){
  body{padding:16px}
  .card{padding:26px 32px}
  .logo{margin-bottom:16px}
  .sub{margin-bottom:20px}
  .field{margin-bottom:13px}
  .field input{padding:11px 14px}
  .submit{padding:13px}
  .footer-text{margin-top:16px}
}

a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
<link rel="stylesheet" href="assets/ui.css">
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="card">
  <div class="logo">Amplify<span>Hub</span></div>
  <h1>Create your account</h1>
  <p class="sub" id="subText">Start your cold calling journey today.</p>
  <form id="authForm" novalidate>
  <div class="field"><label for="nameInput">Full Name</label><input type="text" id="nameInput" placeholder="Your name" autocomplete="name" autofocus></div>
  <div class="field"><label for="emailInput">Email</label><input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email"></div>
  <div class="field"><label for="passwordInput">Password</label><input type="password" id="passwordInput" placeholder="At least 8 characters" autocomplete="new-password"></div>
  <p id="errorText" style="display:none;color:#ff6b6b;font-size:13px;margin:-6px 0 14px;"></p>
  <button class="submit" type="submit" id="submitBtn">Create Account →</button>
  </form>
  <p class="footer-text">Already have an account? <a href="signin.html">Sign in</a></p>
</div>
<script src="assets/vendor/supabase-2.110.8.min.js"></script>
<script src="auth-config.js"></script>
<script src="auth.js"></script>
<script>
// Read redirect destination from URL param. Only known internal pages are
// allowed — anything else falls back to the dashboard (prevents open redirects).
const ALLOWED_REDIRECTS = ['dashboard.html','journey.html','coach-home.html','progress.html','profile.html','challenges.html','settings.html','resources.html','resource.html','interview-prep.html','book-appointments.html'];
// Gated journey lesson pages are whitelisted by pattern so a signed-out
// click on any lesson returns there after account creation.
const LESSON_RE = /^(?:sales-mindset|finding-prospects|building-script|opening-call|discovery-questions|objection-handling|follow-up|live-practice|mastery)-\d+\.html$/;
const params = new URLSearchParams(window.location.search);
const requestedRedirect = params.get('redirect') || '';
// Allow a query string on whitelisted pages (e.g. resource.html?id=…) so
// deep links survive the sign-up round trip. The PATH must still be on the
// whitelist — the query can never change the destination page or origin.
const redirParts = requestedRedirect.split('?');
const redirectPath = (ALLOWED_REDIRECTS.indexOf(redirParts[0]) !== -1 || LESSON_RE.test(redirParts[0])) ? redirParts[0] : 'dashboard.html';
const redirect = redirectPath === redirParts[0] && redirParts[1]
  ? redirectPath + '?' + redirParts.slice(1).join('?')
  : redirectPath;

// Personalise subtitle based on destination
const labels = {
  'journey.html': 'Sign up to start your guided Journey.',
  'coach-home.html': 'Sign up to open AI Coach.',
  'progress.html': 'Sign up to track your Progress.',
  'profile.html': 'Sign up to set up your Profile.'
};
const sub = document.getElementById('subText');
if (labels[redirectPath]) sub.textContent = labels[redirectPath];

function showError(msg) {
  const el = document.getElementById('errorText');
  el.textContent = msg;
  el.style.display = 'block';
}

let signingUp = false;
document.getElementById('authForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  if (signingUp) return;
  const name = document.getElementById('nameInput').value.trim();
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const btn = document.getElementById('submitBtn');

  document.getElementById('errorText').style.display = 'none';

  if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
  if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }

  signingUp = true;
  btn.disabled = true;
  btn.textContent = 'Creating account...';

  const { data, error } = await signUpUser(name, email, password);

  if (error) {
    showError(error.message);
    btn.textContent = 'Create Account →';
    btn.disabled = false;
    signingUp = false;
    return;
  }

  if (data.session) {
    // Email confirmation is OFF in Supabase settings -> logged in immediately
    btn.textContent = '🎉 Welcome!';
    setTimeout(() => { window.location.href = redirect; }, 900);
  } else {
    // Email confirmation is ON -> user must click the link in their inbox first
    sub.textContent = 'Check your email to confirm your account, then sign in.';
    btn.textContent = 'Check your email 📧';
  }
});
</script>
</body>
</html>
