name: Build & QA

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-qa:
    runs-on: ubuntu-latest
    env:
      # Every browser-based QA script honors CHROME_PATH; ubuntu runners ship Chrome here.
      CHROME_PATH: /usr/bin/google-chrome
    defaults:
      run:
        working-directory: sales-mindset-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 strips TypeScript types natively, which qa-coach-request-security
          # relies on when importing the Edge Function source directly.
          node-version: 24
          cache: npm
          cache-dependency-path: sales-mindset-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Sales Mindset build fingerprint matches source
        run: npm run fingerprint:check

      - name: Verify vendored supabase-js matches the pinned package
        run: node scripts/vendor-supabase.mjs --check

      # The build below OVERWRITES sales-mindset/ in the workspace, so the
      # committed copy is set aside first and compared after — otherwise a
      # hand-edited committed bundle would ship to production untested.
      - name: Snapshot committed Sales Mindset bundle
        run: node scripts/verify-committed-bundle.mjs --snapshot /tmp/committed-bundle

      - name: Build (typecheck + vite)
        run: npm run build

      - name: Verify committed bundle corresponds to source
        run: node scripts/verify-committed-bundle.mjs --compare /tmp/committed-bundle

      - name: QA — account trust (static security checks)
        run: npm run qa:account-trust

      - name: QA — coach request security (unit)
        run: node scripts/qa-coach-request-security.mjs

      - name: QA — app smoke (browser)
        run: npm run qa

      - name: QA — booking (browser)
        run: npm run qa:booking

      - name: QA — progress (browser)
        run: npm run qa:progress

      - name: QA — progress account isolation (browser)
        run: npm run qa:progress-sync

      - name: QA — coach security (browser)
        run: node scripts/qa-coach-security.mjs

      - name: QA — challenges (browser)
        run: npm run qa:challenges

      - name: QA — profile/progress (browser)
        run: npm run qa:profile-progress

      - name: QA — UI polish + landing (browser)
        run: npm run qa:ui-polish

      - name: QA — resources (browser + artifact validation)
        run: npm run qa:resources
