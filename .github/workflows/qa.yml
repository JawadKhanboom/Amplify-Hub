name: Build & QA

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-qa:
    runs-on: ubuntu-latest
    env:
      # Every browser-based QA script honors CHROME_PATH; ubuntu runners ship Chrome here.
      CHROME_PATH: /usr/bin/google-chrome
    defaults:
      run:
        working-directory: sales-mindset-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 strips TypeScript types natively, which qa-coach-request-security
          # relies on when importing the Edge Function source directly.
          node-version: 24
          cache: npm
          cache-dependency-path: sales-mindset-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (typecheck + vite)
        run: npm run build

      - name: Verify committed production build is up to date
        working-directory: ${{ github.workspace }}
        run: |
          git add -A -- sales-mindset
          if ! git diff --cached --quiet -- sales-mindset; then
            echo "::error::Committed sales-mindset/ is out of date with sales-mindset-app/ source."
            echo "Changed build files:"
            git --no-pager diff --cached --stat -- sales-mindset
            git --no-pager diff --cached --name-status -- sales-mindset
            echo ""
            echo "Regenerate locally:"
            echo "  npm --prefix sales-mindset-app ci"
            echo "  npm --prefix sales-mindset-app run build"
            echo "  git add -- sales-mindset"
            exit 1
          fi
          echo "Committed sales-mindset/ build matches source."

      - name: QA — account trust (static security checks)
        run: npm run qa:account-trust

      - name: QA — coach request security (unit)
        run: node scripts/qa-coach-request-security.mjs

      - name: QA — app smoke (browser)
        run: npm run qa

      - name: QA — booking (browser)
        run: npm run qa:booking

      - name: QA — progress (browser)
        run: npm run qa:progress

      - name: QA — coach security (browser)
        run: node scripts/qa-coach-security.mjs

      - name: QA — challenges (browser)
        run: npm run qa:challenges

      - name: QA — profile/progress (browser)
        run: npm run qa:profile-progress

      - name: QA — resources (browser + artifact validation)
        run: npm run qa:resources